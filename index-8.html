<!doctype html>
<html lang="en">
<head>

<title>Neptune MVP — Maritime Intelligence Platform</title>
<style>
:root{
  --bg:#050911;--bg2:#08111f;--panel:#0b1424;--panel2:#101d31;--panel3:#15263e;
  --line:rgba(255,255,255,.095);--line2:rgba(207,169,82,.32);--gold:#cfa952;--gold2:#f2d58a;
  --text:#eef4fb;--muted:#8492a6;--soft:#b8c5d6;--blue:#44aaff;--green:#31d17c;--red:#ff5b5f;--amber:#ffbd55;
  --shadow:0 26px 90px rgba(0,0,0,.48);--radius:18px;--sidebar:308px;
}
*{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 14% 0%,rgba(207,169,82,.18),transparent 26%),radial-gradient(circle at 88% 10%,rgba(68,170,255,.11),transparent 30%),linear-gradient(135deg,#03060b,#081321 45%,#050911);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:56px 56px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.72),rgba(0,0,0,.10))}
button,input,select,textarea{font:inherit} button{cursor:pointer;-webkit-tap-highlight-color:transparent} a{color:inherit;text-decoration:none}
.app{position:relative;z-index:1;min-height:100svh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}
.sidebar{height:100svh;position:sticky;top:0;background:linear-gradient(180deg,rgba(8,14,25,.98),rgba(4,8,14,.98));border-right:1px solid rgba(207,169,82,.18);padding:18px 14px;overflow:auto;box-shadow:22px 0 80px rgba(0,0,0,.42);z-index:60}
.logo-row{display:flex;align-items:center;gap:13px;padding:7px 8px 18px;border-bottom:1px solid var(--line)} .logo-row img{width:54px;height:54px;border-radius:17px;object-fit:cover;border:1px solid var(--line2);box-shadow:0 0 38px rgba(207,169,82,.22)} .logo-row b{letter-spacing:.22em;font-size:19px} .logo-row span{display:block;color:var(--muted);font-size:12px;margin-top:3px}
.sidebar-close{display:none;margin-left:auto;border:1px solid var(--line);background:rgba(255,255,255,.05);color:#fff;border-radius:12px;width:38px;height:38px}
.nav{padding:14px 0 80px} .nav-item,.nav-parent{width:100%;border:0;background:transparent;color:var(--soft);display:flex;align-items:center;gap:12px;text-align:left;border-radius:15px;padding:12px 12px;font-weight:780;min-height:48px;touch-action:manipulation;position:relative} .nav-item:hover,.nav-parent:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:linear-gradient(90deg,rgba(207,169,82,.26),rgba(207,169,82,.05));color:var(--gold2);box-shadow:inset 3px 0 0 var(--gold)} .nav-icon{width:24px;text-align:center;opacity:.95} .count{margin-left:auto;background:var(--gold);color:#10151d;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:900} .chev{margin-left:auto;transition:.16s} .group.open .chev{transform:rotate(180deg)}
.children{display:none;padding:2px 0 10px 36px;gap:4px} .group.open .children{display:grid} .children .nav-item{min-height:42px;padding:9px 11px;border-radius:12px;font-size:13.5px;color:#aab6c7}
.main{min-width:0} .topbar{height:74px;display:flex;align-items:center;gap:12px;padding:0 22px;border-bottom:1px solid var(--line);background:rgba(7,13,23,.72);backdrop-filter:blur(18px);position:sticky;top:0;z-index:20} .hamb{display:none;border:1px solid var(--line);background:rgba(255,255,255,.05);color:#fff;border-radius:14px;width:44px;height:44px;font-size:22px} .crumb{color:var(--muted);font-weight:750;font-size:13px;white-space:nowrap} .search{height:46px;flex:1;max-width:620px;min-width:120px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--muted);border-radius:16px;display:flex;align-items:center;justify-content:space-between;padding:0 14px} .kbd{border:1px solid var(--line);border-bottom-width:2px;border-radius:8px;padding:2px 7px;color:#9aa7b8;font-size:11px;background:rgba(255,255,255,.04)} .top-actions{display:flex;align-items:center;gap:9px} .avatar{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#10151d;font-weight:950;display:grid;place-items:center}
.btn{border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--text);border-radius:14px;padding:10px 13px;font-weight:800;display:inline-flex;align-items:center;gap:8px;justify-content:center;transition:.15s transform,.15s background,.15s border} .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.08);border-color:rgba(207,169,82,.35)} .btn.primary{border:0;color:#10151d;background:linear-gradient(135deg,var(--gold2),var(--gold));box-shadow:0 14px 36px rgba(207,169,82,.22)} .btn.icon{width:44px;height:44px;padding:0} .btn.small{padding:8px 10px;border-radius:12px;font-size:13px} .btn.danger{color:#ffd3d3;border-color:rgba(255,91,95,.32);background:rgba(255,91,95,.12)}
.page{padding:24px;max-width:1580px;margin:0 auto} .page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px} .page-title h1{margin:0 0 7px;font-size:36px;letter-spacing:-.045em;line-height:1.05} .page-title p{margin:0;color:var(--muted);line-height:1.5} .page-actions{display:flex;gap:10px;flex-wrap:wrap}
.grid{display:grid;gap:16px} .cols-2{grid-template-columns:repeat(2,minmax(0,1fr))} .cols-3{grid-template-columns:repeat(3,minmax(0,1fr))} .cols-4{grid-template-columns:repeat(4,minmax(0,1fr))} .cols-5{grid-template-columns:repeat(5,minmax(0,1fr))}
.card{background:linear-gradient(180deg,rgba(17,29,49,.82),rgba(8,15,26,.72));border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 18px 55px rgba(0,0,0,.22);padding:18px;position:relative;overflow:hidden} .card.gold{border-color:var(--line2);background:linear-gradient(180deg,rgba(207,169,82,.13),rgba(8,15,26,.70))} .card.alert{border-color:rgba(255,91,95,.34);background:linear-gradient(180deg,rgba(255,91,95,.12),rgba(8,15,26,.70))} .card.blue{border-color:rgba(68,170,255,.30);background:linear-gradient(180deg,rgba(68,170,255,.12),rgba(8,15,26,.70))} .card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px} .card h2{font-size:16px;margin:0;letter-spacing:-.015em} .muted{color:var(--muted)} .soft{color:var(--soft)} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
.kpi .label{color:var(--muted);font-size:12px;font-weight:850;text-transform:uppercase;letter-spacing:.12em} .kpi .value{font-size:36px;font-weight:950;margin:6px 0;letter-spacing:-.06em} .kpi .sub{color:var(--muted);font-size:13px} .spark{height:40px;display:flex;align-items:end;gap:4px;margin-top:16px} .spark span{flex:1;border-radius:999px;background:linear-gradient(to top,rgba(207,169,82,.18),rgba(207,169,82,.82))}
.status{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;white-space:nowrap} .status:before{content:"";width:7px;height:7px;border-radius:50%} .safe{color:#adffd3;background:rgba(49,209,124,.10);border-color:rgba(49,209,124,.28)} .safe:before{background:var(--green)} .warn{color:#ffe0aa;background:rgba(255,189,85,.11);border-color:rgba(255,189,85,.28)} .warn:before{background:var(--amber)} .danger{color:#ffd0d0;background:rgba(255,91,95,.12);border-color:rgba(255,91,95,.30)} .danger:before{background:var(--red)} .info{color:#cceaff;background:rgba(68,170,255,.11);border-color:rgba(68,170,255,.28)} .info:before{background:var(--blue)} .tag{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:999px;color:#b9c5d7;font-size:12px;font-weight:800;padding:6px 9px;display:inline-flex;margin:3px}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px} table{width:100%;border-collapse:collapse;min-width:760px} th,td{text-align:left;padding:13px 14px;border-bottom:1px solid var(--line)} th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.12em;background:rgba(255,255,255,.035)} tr:last-child td{border-bottom:0} tbody tr{cursor:pointer} tbody tr:hover{background:rgba(207,169,82,.06)}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:12px 0 16px} .chip{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:999px;color:#b9c5d7;font-weight:800;font-size:13px;padding:8px 11px} .chip.active{border-color:rgba(207,169,82,.36);background:rgba(207,169,82,.14);color:var(--gold2)}
.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:16px} .hero-copy h2{font-size:42px;line-height:1.03;letter-spacing:-.06em;margin:12px 0 14px} .hero-copy p{font-size:16px;line-height:1.7;color:var(--soft);max-width:760px} .map{min-height:330px;border-radius:18px;position:relative;overflow:hidden;background:radial-gradient(circle at 35% 40%,rgba(68,170,255,.14),transparent 22%),linear-gradient(135deg,#081a2d,#07111d 65%,#050b14)} .map:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:44px 44px} .pin{position:absolute;z-index:2;background:rgba(5,9,17,.78);border:1px solid rgba(207,169,82,.34);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.35)} .pin:before{content:"";display:inline-block;width:8px;height:8px;margin-right:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
.pin.a{left:18%;top:35%} .pin.b{right:15%;top:50%} .pin.c{left:44%;top:20%} .pin.d{left:35%;bottom:18%}
.timeline{display:grid;gap:12px} .tl{display:grid;grid-template-columns:82px 1fr;gap:12px;align-items:start} .time{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:999px;padding:7px 9px;text-align:center;color:var(--muted);font-weight:850;font-size:12px} .tl-body{border-left:2px solid rgba(207,169,82,.35);padding-left:12px} .tl-body b{display:block} .tl-body span{display:block;color:var(--muted);font-size:13px;margin-top:3px}
.entity-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px} .entity-card{cursor:pointer;min-height:150px} .entity-card:hover{border-color:rgba(207,169,82,.34);transform:translateY(-1px)} .progress{height:10px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden} .progress span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold2),var(--gold))}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px} .tab{border:1px solid var(--line);background:rgba(255,255,255,.045);color:#b9c5d7;border-radius:999px;padding:9px 12px;font-weight:850} .tab.active{border-color:rgba(207,169,82,.42);background:rgba(207,169,82,.16);color:var(--gold2)} .subpage{display:none} .subpage.active{display:block}
.kanban{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px} .lane{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:18px;padding:12px} .lane h3{margin:0 0 10px;font-size:14px;color:var(--soft)} .ticket{background:linear-gradient(180deg,rgba(17,29,49,.88),rgba(8,15,26,.82));border:1px solid var(--line);border-radius:15px;padding:12px;margin-bottom:10px;cursor:pointer}
.chart{height:220px;display:flex;gap:9px;align-items:end;padding:20px 8px 8px} .bar{flex:1;border-radius:12px 12px 4px 4px;background:linear-gradient(to top,rgba(207,169,82,.2),rgba(207,169,82,.9));position:relative} .bar:after{content:attr(data-label);position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted)}
.ai-shell{display:grid;grid-template-columns:minmax(0,1.4fr) 360px;gap:16px} .chat-log{height:460px;overflow:auto;display:flex;flex-direction:column;gap:12px;padding:6px} .bubble{align-self:flex-start;max-width:84%;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:18px 18px 18px 6px;padding:12px 14px;line-height:1.5} .bubble.user{align-self:flex-end;background:rgba(207,169,82,.15);border-color:rgba(207,169,82,.28);border-radius:18px 18px 6px 18px} .chat-input{display:flex;gap:10px;margin-top:12px} .chat-input input{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:15px;padding:12px 14px;color:#fff;outline:0}
.drawer{position:fixed;right:0;top:0;height:100svh;width:min(500px,94vw);background:rgba(7,13,23,.98);border-left:1px solid var(--line);box-shadow:-30px 0 90px rgba(0,0,0,.55);z-index:90;transform:translateX(105%);transition:.2s ease;overflow:auto;padding:22px} .drawer.open{transform:translateX(0)} .drawer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px} .drawer-head h2{margin:0;font-size:24px} .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:70} .scrim.open{display:block} .mobile-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:50} .mobile-scrim.open{display:block}
.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.58);align-items:flex-start;justify-content:center;padding:8vh 14px} .modal.open{display:flex} .command{width:min(760px,100%);background:rgba(7,13,23,.98);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:16px} .command-input{display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:14px} .command-input input{flex:1;border:0;background:transparent;color:#fff;outline:0;font-size:20px} .results{display:grid;gap:8px;margin-top:14px} .result{border:1px solid var(--line);background:rgba(255,255,255,.045);color:#fff;border-radius:15px;padding:12px;text-align:left;display:flex;justify-content:space-between;gap:12px} .result:hover{border-color:rgba(207,169,82,.34);background:rgba(207,169,82,.09)}
.fab{position:fixed;right:24px;bottom:24px;width:62px;height:62px;border:0;border-radius:22px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#10151d;font-size:32px;font-weight:950;z-index:40;box-shadow:0 20px 56px rgba(207,169,82,.25)} .quick{display:none;position:fixed;right:24px;bottom:96px;width:280px;background:rgba(7,13,23,.98);border:1px solid var(--line);border-radius:20px;padding:10px;z-index:80;box-shadow:var(--shadow)} .quick.open{display:grid;gap:8px} .toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,80px);transition:.2s;z-index:120;background:rgba(7,13,23,.98);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:999px;padding:12px 16px;font-weight:850} .toast.show{transform:translate(-50%,0)}
.form-row{display:grid;gap:8px;margin:12px 0} .form-row label{font-size:12px;color:var(--muted);font-weight:850} input,select,textarea{border:1px solid var(--line);background:rgba(255,255,255,.055);color:#fff;border-radius:14px;padding:12px;outline:0;width:100%} textarea{min-height:110px;resize:vertical}
@media(max-width:1220px){.cols-5,.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}.entity-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.hero,.ai-shell{grid-template-columns:1fr}.kanban{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:900px){.app{display:block}.sidebar{position:fixed;left:0;top:0;width:min(88vw,360px);max-width:360px;transform:translateX(-106%);transition:.22s ease;z-index:80;background:#050911!important;box-shadow:30px 0 90px rgba(0,0,0,.78)}.sidebar.open{transform:translateX(0)}.sidebar-close{display:block}.hamb{display:inline-grid;place-items:center}.topbar{height:66px;padding:0 12px}.crumb,.top-actions .avatar{display:none}.page{padding:16px}.page-head{display:block}.page-actions{margin-top:12px}.page-title h1{font-size:30px}.grid,.cols-2,.cols-3,.cols-4,.cols-5,.entity-grid,.kanban{grid-template-columns:1fr}.hero-copy h2{font-size:32px}.map{min-height:250px}.children{display:grid!important}.group .chev{display:none}.nav-parent{color:var(--gold2);background:rgba(207,169,82,.09)}.fab{right:16px;bottom:16px}.quick{right:16px;bottom:88px}.search .label{display:none}.bubble{max-width:94%}}
@media(max-width:520px){.top-actions .btn.icon:not(.keep){display:none}.search{font-size:13px}.page-title h1{font-size:28px}.card{padding:15px}.tl{grid-template-columns:1fr}table{min-width:680px}}
</style>
</head>

function pageHead(t,s,a=''){return `<div class="page-head"><div class="page-title"><h1>${t}</h1><p>${s}</p></div><div class="page-actions">${a}</div></div>`}

 let html=''; NAV.forEach(n=>{ if(!n.children){html+=`<button class="nav-item ${current===n.page?'active':''}" data-page="${n.page}"><span class="nav-icon">${n.icon}</span><span>${n.label}</span>${n.count?`<span class="count">${n.count}</span>`:''}</button>`; return;}
 const active=n.children.some(c=>c[1]===current), open=openGroups.has(n.label); html+=`<div class="group ${open?'open':''}"><button class="nav-parent ${active?'active':''}" data-group="${n.label}"><span class="nav-icon">${n.icon}</span><span>${n.label}</span><span class="chev">⌄</span></button><div class="children">${n.children.map(c=>`<button class="nav-item ${current===c[1]?'active':''}" data-page="${c[1]}">${c[0]}</button>`).join('')}</div></div>`; }); $('#nav').innerHTML=html;
}
function titleForPage(p){for(const n of NAV){if(n.page===p)return n.label;if(n.children)for(const c of n.children)if(c[1]===p)return c[0];}return 'Dashboard'}
function go(p,push=true){current=p||'dashboard'; renderNav(); $('#crumb').textContent=titleForPage(current); $('#page').innerHTML=(PAGES[current]||PAGES.dashboard)(); closeMobile(); if(push) history.replaceState(null,'','#'+current);}
function closeMobile(){$('#sidebar').classList.remove('open');$('#mobileScrim').classList.remove('open');document.body.style.overflow=''}
function openMobile(){$('#sidebar').classList.add('open');$('#mobileScrim').classList.add('open');document.body.style.overflow='hidden'}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.T);window.T=setTimeout(()=>t.classList.remove('show'),2400)}
function drawer(title,html){$('#drawer').innerHTML=`<div class="drawer-head"><h2>${title}</h2><button class="btn icon" id="closeDrawer">×</button></div>${html}`;$('#drawer').classList.add('open');$('#scrim').classList.add('open')}
function closeDrawer(){$('#drawer').classList.remove('open');$('#scrim').classList.remove('open')}
function rowDrawer(r){drawer(r[0]||'Record',`<p class="muted">Full record detail view with audit trail, comments, approvals, attachments, and workflow actions.</p><div class="grid" style="gap:10px;margin:16px 0">${r.map((v,i)=>`<div class="card" style="padding:12px"><b>${i===0?'Primary':'Field '+i}</b><p class="muted" style="margin:6px 0 0">${esc(v)}</p></div>`).join('')}</div><div class="page-actions"><button class="btn primary" data-toast="Workflow advanced">Take Action</button><button class="btn" data-toast="Comment added">Comment</button><button class="btn" data-toast="Export started">Export</button></div><div class="card" style="margin-top:16px"><h2>Audit Trail</h2><div class="timeline" style="margin-top:12px"><div class="tl"><div class="time">14:11</div><div class="tl-body"><b>System validation completed</b><span>Record passed required checks.</span></div></div><div class="tl"><div class="time">13:45</div><div class="tl-body"><b>Submitted for approval</b><span>Routed to the responsible role.</span></div></div></div></div>`)}
function chips(a){return `<div class="toolbar">${a.map((x,i)=>`<button class="chip ${i===0?'active':''}" data-toast="${x} filter applied">${x}</button>`).join('')}</div>`}

function renderCommand(q=''){const items=[]; NAV.forEach(n=>{if(n.page)items.push([n.label,n.page,'Navigate']); if(n.children)n.children.forEach(c=>items.push([c[0],c[1],'Navigate']));}); ['Create PTW','Create Work Order','Create Purchase Order','Generate PSC Pack','Draft Master Brief','Upload Certificate'].forEach(x=>items.push([x,'action','Command'])); rows.vessels.forEach(v=>items.push([v[0],'vessel-profile','Vessel'])); const res=items.filter(i=>!q||i[0].toLowerCase().includes(q.toLowerCase())||i[2].toLowerCase().includes(q.toLowerCase())).slice(0,12); $('#results').innerHTML=res.map(i=>`<button class="result" data-cmd="${i[1]}" data-title="${esc(i[0])}"><b>${i[0]}</b><span>${i[2]}</span></button>`).join('')||'<p class="muted">No results</p>'}
function openCommand(){$('#commandModal').classList.add('open');renderCommand();setTimeout(()=>$('#commandInput').focus(),30)} function closeCommand(){$('#commandModal').classList.remove('open')}
function quickMenu(){const q=$('#quick');q.innerHTML=['New PTW','New Work Order','New Purchase Order','Upload Certificate','Generate Report','Invite User'].map(x=>`<button class="btn" data-toast="${x} opened">${x}</button>`).join('');q.classList.toggle('open')}
function notifications(){drawer('Notification Center',`<div class="tabs"><button class="tab active">Critical</button><button class="tab">Approvals</button><button class="tab">System</button></div>${table(['Item','Description','Module','Risk'],rows.tasks)}`)}
function profile(){drawer('Profile',`<div class="card"><div class="card-head"><h2>Francis Eagleston</h2><div class="avatar">F</div></div><p class="muted">Owner · Neptune Maritime Intelligence</p>${table(['Setting','Value','Status'],[['Role','Owner','Active'],['Workspace','Neptune MVP','Safe'],['Theme','Premium dark','Safe']])}</div>`)}
function sendAi(msg){const input=$('#aiInput');const v=(msg||input.value||'').trim();if(!v)return;const log=$('#chatLog');log.insertAdjacentHTML('beforeend',`<div class="bubble user">${esc(v)}</div><div class="bubble">Neptune AI recommends prioritizing <b>PTW #0047</b>, then closing eORB #044 and PO-291. I can turn either into a task or report from this MVP screen.</div>`); if(input)input.value=''; log.scrollTop=log.scrollHeight}

document.addEventListener('click',e=>{
 const page=e.target.closest('[data-page]'); if(page){go(page.dataset.page); return}
 const group=e.target.closest('[data-group]'); if(group){const g=group.dataset.group; openGroups.has(g)?openGroups.delete(g):openGroups.add(g); renderNav(); return}
 const record=e.target.closest('[data-record]'); if(record){try{rowDrawer(JSON.parse(record.dataset.record))}catch{} return}
 const row=e.target.closest('tbody tr'); if(row?.dataset.record){try{rowDrawer(JSON.parse(row.dataset.record))}catch{} return}
 const toastBtn=e.target.closest('[data-toast]'); if(toastBtn){toast(toastBtn.dataset.toast);return}
 const sub=e.target.closest('[data-sub]'); if(sub){const root=$('#page');root.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));sub.classList.add('active');root.querySelectorAll('.subpage').forEach(x=>x.classList.remove('active'));$('#'+sub.dataset.sub)?.classList.add('active');return}
 const ai=e.target.closest('[data-ai]'); if(ai){sendAi(ai.dataset.ai);return}
 const cmd=e.target.closest('[data-cmd]'); if(cmd){if(cmd.dataset.cmd==='action') toast(cmd.dataset.title+' opened'); else go(cmd.dataset.cmd); closeCommand(); return}
 if(e.target.id==='openSidebar')openMobile(); if(e.target.id==='closeSidebar'||e.target.id==='mobileScrim')closeMobile(); if(e.target.id==='notifBtn')notifications(); if(e.target.id==='profileBtn')profile(); if(e.target.id==='scrim'||e.target.id==='closeDrawer')closeDrawer(); if(e.target.id==='openCommand')openCommand(); if(e.target.id==='closeCommand'||e.target.id==='commandModal')closeCommand(); if(e.target.id==='fab')quickMenu(); if(e.target.id==='sendAi')sendAi();
});
document.addEventListener('input',e=>{if(e.target.id==='commandInput')renderCommand(e.target.value)}); document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCommand()} if(e.key==='Escape'){closeCommand();closeDrawer();closeMobile()} if(e.key==='Enter'&&e.target.id==='aiInput')sendAi()});
window.addEventListener('hashchange',()=>go((location.hash||'#dashboard').slice(1),false)); go((location.hash||'#dashboard').slice(1),false);
</script>
</body>
</html>
